# Deploy to Oracle Cloud VM on push to main.
# Required secrets: DEPLOY_HOST, DEPLOY_USER, SSH_PRIVATE_KEY (and optionally DEPLOY_PATH).

name: Deploy to OCI
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: .next/
          target: /var/www/python.kaidan.dev

      - name: Restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd /var/www/python.kaidan.dev
            git fetch origin && git reset --hard origin/main
            npm ci --omit=dev
            pm2 restart python-kaidan || pm2 start npm --name python-kaidan -- start
            pm2 save
            sudo systemctl reload nginx
