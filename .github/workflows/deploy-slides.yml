name: Deploy Slides

on:
  push:
    branches:
      - main
    paths:
      - 'slides/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: slides/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: slides

      - name: Build slides
        run: npm run build
        working-directory: slides

      - name: Prepare slides directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: mkdir -p /var/www/slides

      - name: Copy slides to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: slides/dist/
          target: /var/www/slides
          strip_components: 2
